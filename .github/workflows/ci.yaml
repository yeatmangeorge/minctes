name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format

      - name: Install MacOS Dependencies
        if: runner.os == 'macOS'
        run: brew install clang-format

      - name: Build
        env:
          CC: ${{ matrix.compiler }}
        run: make

      - name: Run tests
        run: make test